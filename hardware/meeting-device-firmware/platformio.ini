; PlatformIO Configuration for ReSpeaker XVF3800 Meeting Device
; https://docs.platformio.org/page/projectconf.html

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

; Library dependencies
lib_deps = 
    ArduinoJson@^7.0.0
    WiFi
    HTTPClient
    FS
    SPIFFS

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; -DQEECLAW_WIFI_SSID='"YourWiFiSSID"'
    ; -DQEECLAW_WIFI_PASSWORD='"YourWiFiPassword"'
    ; -DQEECLAW_API_BASE_URL='"http://127.0.0.1:8000"'
    ; -DQEECLAW_DEVICE_NAME='"Meeting Room Device"'

; Upload settings (adjust COM port as needed)
; upload_port = /dev/cu.usbmodem*
