# QeeClaw Hermes Bridge
#
# Python 桥接服务：充当 TypeScript SDK 与 hermes-agent 之间的 HTTP 适配器。
# SDK 默认 Runtime 为 Hermes，通过此桥接服务调用 hermes-agent 核心。

[project]
name = "qeeclaw-hermes-bridge"
version = "0.1.0"
description = "HTTP bridge between QeeClaw TypeScript SDK and hermes-agent Python runtime"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
dependencies = [
    "openai>=2.21.0,<3",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pyyaml>=6.0",
    "watchfiles>=0.24.0",
    "chromadb>=1.0.0",
    "aiohttp>=3.9.0",
    "cryptography>=42.0.0",
]

[project.optional-dependencies]
hermes = [
    # 当用户需要完整的 hermes-agent 能力时安装
    "hermes-agent",
]
dev = [
    "pytest>=9.0,<10",
    "httpx>=0.28,<1",
]

[project.scripts]
qeeclaw-hermes-bridge = "bridge_server:main"

[tool.setuptools]
py-modules = ["bridge_server", "wechat_gateway", "knowledge_store"]
